name: BalkanIntel Auto-Scraper

on:
  schedule:
    - cron: "0 */6 * * *" # Wakes up every 6 hours
  workflow_dispatch: # Allows you to click a "Run Now" button manually on GitHub

jobs:
  scrape_and_analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the robot permission to push the DB back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        # Assuming you use standard libraries for scraping. Adjust if you have a requirements_backend.txt
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests pandas google-generativeai python-dotenv

      - name: Run the Orchestrator
        # Pulls the secret keys out of the GitHub vault temporarily
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        run: python orchestrator.py

      - name: Commit and Push the updated Database
        run: |
          git config --global user.name "BalkanIntel-Bot"
          git config --global user.email "bot@balkanintel.local"
          git add news_aggregator.db
          # The robot checks if new news was added. If yes, it commits. If no, it goes back to sleep.
          git diff --staged --quiet || git commit -m "🤖 Auto-update database with latest news cycle"
          git push