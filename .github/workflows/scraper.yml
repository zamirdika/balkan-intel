name: Run Balkan Intel Pipeline

on:
  workflow_dispatch: # Allows you to run it manually
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours

jobs:
  scrape_and_analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 requests pandas google-generativeai google.genai python-dotenv

      - name: Run the Orchestrator
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
        run: python orchestrator.py

      - name: Commit and Push the updated Database
        run: |
          git config --global user.name "BalkanIntel-Bot"
          git config --global user.email "bot@balkanintel.local"
          git add news_aggregator.db
          if git diff --staged --quiet; then
            echo "No new news to commit."
          else
            git commit -m "🤖 Auto-update database with latest news cycle"
            git push
          fi
